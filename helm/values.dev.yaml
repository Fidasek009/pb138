# Dev environment overrides.
# Usage: helm upgrade --install pagepal ./helm -n pagepal-dev -f ./helm/values.dev.yaml

api:
  replicaCount: 1
  image:
    tag: "dev"
    pullPolicy: "Always"
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

web:
  replicaCount: 1
  image:
    tag: "dev"
    pullPolicy: "Always"

ingress:
  enabled: true
  className: "nginx"
  host: "dev.pagepal.dyn.cloud.e-infra.cz"
  tls: true
  tlsSecretName: "pagepal-dev-tls"

postgresql:
  auth:
    existingSecret: ""
  primary:
    persistence:
      size: "1Gi"

migration:
  enabled: false
  image:
    tag: "dev"
